<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SBTI-Pro | 灵魂拷问</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ecfdf5;
        --surface: rgba(255, 255, 255, 0.82);
        --surface-strong: #ffffff;
        --line: rgba(6, 78, 59, 0.14);
        --line-strong: rgba(6, 78, 59, 0.26);
        --text: #064e3b;
        --muted: #4b6b61;
        --primary: #059669;
        --primary-strong: #047857;
        --accent: #fbbf24;
        --danger: #b91c1c;
        --shadow: 0 24px 60px rgba(5, 150, 105, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Noto Sans SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(16, 185, 129, 0.16), transparent 32%),
          radial-gradient(circle at 85% 16%, rgba(251, 191, 36, 0.2), transparent 22%),
          linear-gradient(180deg, #f8fffb 0%, var(--bg) 48%, #e6f7ee 100%);
        padding: 32px 18px;
      }

      .shell {
        width: min(1120px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 460px);
        gap: 28px;
        align-items: center;
        min-height: calc(100vh - 64px);
      }

      .hero {
        padding: 18px 4px;
        animation: rise-in 550ms ease-out both;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(5, 150, 105, 0.14);
        font-size: 0.92rem;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .eyebrow::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), var(--accent));
      }

      h1 {
        margin: 18px 0 14px;
        font-family: "Outfit", "Noto Sans SC", sans-serif;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.05;
        font-size: clamp(2.4rem, 7vw, 4.9rem);
        max-width: 10ch;
      }

      .lead {
        margin: 0;
        max-width: 54ch;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.08rem);
        line-height: 1.8;
      }

      .highlights {
        margin: 28px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .highlights li {
        padding: 16px 18px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.56);
        border: 1px solid rgba(6, 78, 59, 0.1);
        backdrop-filter: blur(14px);
      }

      .highlights strong {
        display: block;
        margin-bottom: 6px;
        font-family: "Outfit", "Noto Sans SC", sans-serif;
        font-size: 1.2rem;
      }

      .highlights span {
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.6;
      }

      .panel {
        position: relative;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 30px 26px 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        animation: rise-in 650ms ease-out both;
      }

      .panel::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.75), rgba(16, 185, 129, 0.08));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      .panel h2 {
        margin: 0;
        font-family: "Outfit", "Noto Sans SC", sans-serif;
        font-size: 1.75rem;
        letter-spacing: -0.02em;
      }

      .panel-intro {
        margin: 10px 0 24px;
        color: var(--muted);
        line-height: 1.7;
      }

      .question {
        margin: 0 0 28px;
        font-size: 1.15rem;
        font-weight: 700;
        line-height: 1.6;
        color: var(--text);
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .option-btn {
        width: 100%;
        border: 2px solid var(--line-strong);
        border-radius: 999px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 700;
        font-size: 1rem;
        color: var(--text);
        background: var(--surface-strong);
        cursor: pointer;
        transition: all 180ms ease;
      }

      .option-btn:hover {
        border-color: var(--primary);
        background: rgba(5, 150, 105, 0.06);
        transform: translateY(-2px);
      }

      .option-btn:active {
        transform: translateY(0);
      }

      .option-btn.believe {
        border-color: var(--primary);
        color: var(--primary-strong);
      }

      .option-btn.disbelieve {
        border-color: var(--accent);
        color: #92400e;
      }

      .option-btn.disbelieve:hover {
        background: rgba(251, 191, 36, 0.1);
        border-color: var(--accent);
      }

      @keyframes rise-in {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 920px) {
        .shell {
          grid-template-columns: 1fr;
          gap: 18px;
          min-height: auto;
        }

        .hero {
          padding-top: 0;
        }

        h1 {
          max-width: none;
        }

        .highlights {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero" aria-label="页面介绍">
        <span class="eyebrow">SBTI-Pro 灵魂拷问</span>
        <h1>在看到答案之前，先回答一个问题。</h1>
        <p class="lead">
          你的答案没有对错之分，但它会影响最终呈现给你的结果风格。认真思考后再选择吧。
        </p>
        <ul class="highlights">
          <li>
            <strong>真诚作答</strong>
            <span>选择你最真实的想法，不需要迎合任何预期。</span>
          </li>
          <li>
            <strong>影响结果</strong>
            <span>你的回答会决定结果页展示的文案风格。</span>
          </li>
          <li>
            <strong>独立思考</strong>
            <span>不被外界定义，才是有趣的灵魂。</span>
          </li>
        </ul>
      </section>

      <main class="panel">
        <h2>最后确认</h2>
        <p class="panel-intro">这是正式测试前的最后一个问题，请认真作答。</p>
        <p class="question">你相信 SBTI 测试可以反应你的人格吗？</p>
        <div class="options">
          <button class="option-btn believe" id="believe-btn">相信</button>
          <button class="option-btn disbelieve" id="disbelieve-btn">不相信</button>
        </div>
      </main>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name") || "";
      const age = params.get("age") || "";

      document.getElementById("believe-btn").addEventListener("click", () => {
        const newParams = new URLSearchParams({ name, age, belief: "believe" });
        window.location.href = "./result.html?" + newParams.toString();
      });

      document.getElementById("disbelieve-btn").addEventListener("click", () => {
        const newParams = new URLSearchParams({ name, age, belief: "disbelieve" });
        window.location.href = "./result.html?" + newParams.toString();
      });
    </script>
  </body>
</html>
